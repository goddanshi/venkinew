server {
    listen 80;
    server_name venkivgmk.ru www.venkivgmk.ru _;

    # Перенаправляем www → без www
    if ($host = www.venkivgmk.ru) {
        return 301 https://venkivgmk.ru$request_uri;
    }

    location / {
        proxy_pass         http://web:80;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # Статику отдаём напрямую через PHP-контейнер (уже быстро)
    # Для продакшна можно добавить gzip и кэш-заголовки здесь
    gzip on;
    gzip_types text/css application/javascript text/html application/json;
}
