services:
  web:
    build: .
    # Порт наружу не открываем — nginx обращается внутри сети
    expose:
      - "80"
    volumes:
      - .:/var/www/html
      - venki_data:/var/www/html/data
      - venki_uploads:/var/www/html/uploads
    restart: unless-stopped
    environment:
      - PHP_CLI_SERVER_WORKERS=4

  nginx:
    image: nginx:alpine
    ports:
      - "5080:80"   # nginx на хосте проксирует :80 → :5080
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
    restart: unless-stopped

volumes:
  venki_data:
  venki_uploads:
