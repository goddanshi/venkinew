services:
  web:
    build: .
    expose:
      - "80"
    volumes:
      - .:/var/www/html
      # uploads персистентны — новые фото не теряются при обновлении
      - venki_uploads:/var/www/html/uploads
    restart: unless-stopped
    environment:
      - PHP_CLI_SERVER_WORKERS=4

  nginx:
    image: nginx:alpine
    ports:
      - "5080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
    restart: unless-stopped

volumes:
  venki_uploads:
